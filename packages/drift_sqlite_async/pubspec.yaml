  drift_dev: ">=2.28.0 <3.0.0"
  glob: ^2.1.2
  lints: ^6.0.0
  test: ^1.25.2
  test_api: ^0.7.0

platforms:
  android:
  ios:
  linux:
  macos:
  windows:
  web:
